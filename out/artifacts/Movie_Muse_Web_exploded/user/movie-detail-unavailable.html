<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暂无资源 - Movie-Muse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: url('../images/pawel-czerwinski-prMn9KINLtI-unsplash.jpg') center center / cover no-repeat;
            position: relative;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }

        * {
            position: relative;
            z-index: 1;
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            text-decoration: none;
            margin-right: 40px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .nav-link:hover {
            color: #ffffff;
        }

        .unavailable-section {
            padding: 4rem 8% 2rem 8%;
            text-align: center;
        }

        .unavailable-box {
            background: rgba(30, 37, 64, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 4rem 2rem;
            margin-bottom: 3rem;
        }

        .unavailable-icon {
            font-size: 5rem;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 2rem;
        }

        .unavailable-title {
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 1rem;
        }

        .unavailable-message {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .back-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 32px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .recommended-section {
            margin-top: 3rem;
            text-align: left;
        }

        .recommended-section h2 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: #ffffff;
            text-align: center;
        }

        .recommended-movies {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .movie-card-rec {
            width: 220px;
            background: rgba(30, 37, 64, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
        }

        .movie-card-rec:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(138, 43, 226, 0.2);
        }

        .movie-card-rec .card-poster {
            width: 100%;
            height: 320px;
            object-fit: cover;
        }

        .movie-card-rec .card-info {
            padding: 1rem;
        }

        .movie-card-rec .card-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-card-rec .card-rating {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .movie-card-rec .card-rating .stars {
            color: #fbbf24;
            font-size: 0.9rem;
        }

        .movie-card-rec .card-rating .score {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
        }

        .page-footer {
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .page-footer .footer-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1rem;
        }

        .page-footer .footer-links a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .page-footer .footer-links a:hover {
            color: #a855f7;
        }

        .page-footer p {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.85rem;
            margin: 0;
        }

        .search-bar-page {
            max-width: 1200px;
            margin: 5.5rem auto 0;
            padding: 0 2rem;
        }

        .search-bar-page .search-input-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        @media (max-width: 768px) {
            .unavailable-box {
                padding: 3rem 1.5rem;
            }

            .unavailable-title {
                font-size: 1.5rem;
            }

            .recommended-movies {
                gap: 1.5rem;
            }

            .movie-card-rec {
                width: 180px;
            }

            .movie-card-rec .card-poster {
                height: 260px;
            }
        }
    </style>
</head>
<body>
    <nav class="fixed top-0 left-0 right-0 z-50" style="background: transparent; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="nav-container">
                <a href="../index.html" class="logo">Movie-Muse</a>
                <div class="hidden md:flex items-center gap-8">
                    <a href="../index.html" class="nav-link">首页</a>
                    <a href="profile.html" class="nav-link">个人中心</a>
                    <a href="login.jsp" class="bg-white/20 hover:bg-white/30 text-white px-5 py-2 rounded-full font-medium transition-colors backdrop-blur-sm border border-white/30" id="navLoginBtn">登录 / 注册</a>
                    <a href="profile.html" class="bg-white/20 hover:bg-white/30 text-white px-5 py-2 rounded-full font-medium transition-colors backdrop-blur-sm border border-white/30" id="navUsername" style="display: none;">用户</a>
                </div>
                <button id="mobileMenuBtn" class="md:hidden text-white text-xl">
                    <i class="fas fa-bars"></i>
                </button>
            </div>

            <div id="mobileMenu" class="hidden md:hidden mt-4 pb-4 border-t border-white/10 pt-4">
                <div class="flex flex-col gap-4">
                    <a href="../index.html" class="nav-link">首页</a>
                    <a href="profile.html" class="nav-link">个人中心</a>
                    <a href="login.jsp" class="bg-white/20 hover:bg-white/30 text-white px-5 py-2 rounded-full font-medium text-center transition-colors backdrop-blur-sm border border-white/30" id="mobileNavLoginBtn">登录 / 注册</a>
                    <a href="profile.html" class="bg-white/20 hover:bg-white/30 text-white px-5 py-2 rounded-full font-medium text-center transition-colors backdrop-blur-sm border border-white/30" id="mobileNavUsername" style="display: none;">用户</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="search-bar-page">
        <div class="search-input-wrapper">
            <input type="text" class="search-glass w-full pl-12 pr-12 py-4 rounded-xl focus:outline-none transition-all" placeholder="搜索电影、导演、演员...">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-white/40"></i>
        </div>
    </div>

    <main class="unavailable-section">
        <div class="unavailable-box">
            <div class="unavailable-icon">
                <i class="fas fa-film"></i>
            </div>
            <h1 class="unavailable-title">暂无视频资源</h1>
            <p class="unavailable-message">
                抱歉，该电影目前暂无播放资源<br>
                请看看别的电影吧，我们为您推荐以下精彩内容
            </p>
            <a href="movie-list-page1.html" class="back-btn">
                <i class="fas fa-arrow-left" style="margin-right: 8px;"></i>
                返回电影列表
            </a>
        </div>

        <div class="recommended-section">
            <h2>
                <i class="fas fa-star" style="color: #fbbf24; margin-right: 10px;"></i>
                热门推荐 · 限时免费观看
            </h2>
            <div class="recommended-movies">
                <a href="movie-detail.html" class="movie-card-rec">
                    <img src="https://picsum.photos/220/320?random=1" alt="星际穿越" class="card-poster">
                    <div class="card-info">
                        <h3 class="card-title">星际穿越</h3>
                        <div class="card-rating">
                            <span class="stars">★★★★★</span>
                            <span class="score">9.4</span>
                        </div>
                    </div>
                </a>

                <a href="movie-detail-shawshank.html" class="movie-card-rec">
                    <img src="https://picsum.photos/220/320?random=5" alt="肖申克的救赎" class="card-poster">
                    <div class="card-info">
                        <h3 class="card-title">肖申克的救赎</h3>
                        <div class="card-rating">
                            <span class="stars">★★★★★</span>
                            <span class="score">9.5</span>
                        </div>
                    </div>
                </a>

                <a href="movie-detail-spirited.html" class="movie-card-rec">
                    <img src="https://picsum.photos/220/320?random=8" alt="千与千寻" class="card-poster">
                    <div class="card-info">
                        <h3 class="card-title">千与千寻</h3>
                        <div class="card-rating">
                            <span class="stars">★★★★★</span>
                            <span class="score">9.2</span>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </main>

    <footer class="page-footer">
        <div class="footer-links">
            <a href="#">关于我们</a>
            <a href="#">隐私政策</a>
            <a href="#">服务条款</a>
            <a href="#">联系我们</a>
        </div>
        <p>&copy; 2024 Movie-Muse. All rights reserved.</p>
    </footer>

    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const username = localStorage.getItem('username') || '用户';
            
            if (isLoggedIn) {
                const navLoginBtn = document.getElementById('navLoginBtn');
                const navUsername = document.getElementById('navUsername');
                const mobileNavLoginBtn = document.getElementById('mobileNavLoginBtn');
                const mobileNavUsername = document.getElementById('mobileNavUsername');
                
                if (navLoginBtn) navLoginBtn.style.display = 'none';
                if (navUsername) {
                    navUsername.textContent = username;
                    navUsername.style.display = 'block';
                }
                if (mobileNavLoginBtn) mobileNavLoginBtn.style.display = 'none';
                if (mobileNavUsername) {
                    mobileNavUsername.textContent = username;
                    mobileNavUsername.style.display = 'block';
                }
            }
        });

        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        
        if (mobileMenuBtn && mobileMenu) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
        }

        const searchInput = document.querySelector('.search-glass');
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (query) {
                    window.location.href = '../search.html?q=' + encodeURIComponent(query);
                }
            }
        });
    </script>
</body>
</html>
