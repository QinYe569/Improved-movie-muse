<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏 - Movie-Muse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: url('../images/pawel-czerwinski-VWVO0g9A3rg-unsplash.jpg') center center / cover no-repeat;
            position: relative;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }

        * {
            position: relative;
            z-index: 1;
        }

        /* ===== Navigation ===== */
        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            text-decoration: none;
            margin-right: 40px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .nav-link:hover {
            color: #ffffff;
        }

        .main-content {
            padding: 6rem 8% 4rem 8%;
        }

        .content-area {
            flex: 1;
        }

        .content-header {
            background: rgba(30, 37, 64, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
        }

        .content-header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin: 0;
            color: #ffffff;
        }

        .content-header p {
            margin: 0.5rem 0 0;
            color: rgba(255, 255, 255, 0.5);
        }

        .table-container {
            background: rgba(30, 37, 64, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            overflow: hidden;
        }

        .favorite-table {
            width: 100%;
            border-collapse: collapse;
        }

        .favorite-table thead {
            background: rgba(138, 43, 226, 0.15);
        }

        .favorite-table th {
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            color: #ffffff;
            font-size: 0.9rem;
            border-bottom: 2px solid rgba(255, 255, 255, 0.08);
        }

        .favorite-table tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s ease;
        }

        .favorite-table tbody tr:hover {
            background: rgba(138, 43, 226, 0.1);
        }

        .favorite-table tbody tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.03);
        }

        .favorite-table tbody tr:nth-child(even):hover {
            background: rgba(138, 43, 226, 0.1);
        }

        .favorite-table td {
            padding: 14px 16px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        .poster-thumbnail {
            width: 50px;
            height: 70px;
            object-fit: cover;
            border-radius: 6px;
        }

        .movie-title {
            font-weight: 600;
            color: #ffffff;
        }

        .genre-badge {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(138, 43, 226, 0.3);
            color: #d8b4fe;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-sm {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        .btn-primary-sm {
            background: linear-gradient(135deg, #8a2be2, #a855f7);
            color: white;
            box-shadow: 0 2px 8px rgba(138, 43, 226, 0.3);
        }

        .btn-primary-sm:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(138, 43, 226, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            background: rgba(30, 37, 64, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
        }

        .empty-state .empty-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 1.5rem;
            background: rgba(138, 43, 226, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #a855f7;
        }

        .empty-state h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }

        .empty-state p {
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 1.5rem;
        }

        .page-footer {
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .page-footer .footer-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1rem;
        }

        .page-footer .footer-links a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .page-footer .footer-links a:hover {
            color: #a855f7;
        }

        .page-footer p {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.85rem;
            margin: 0;
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }

            .sidebar {
                flex: 1;
            }

            .sidebar-nav {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }

            .sidebar-nav li {
                margin-bottom: 0;
            }

            .sidebar-nav a {
                padding: 10px 16px;
            }

            .sidebar-nav .logout {
                margin-top: 0;
                padding-top: 0;
                border-top: none;
            }

            .table-container {
                overflow-x: auto;
            }

            .favorite-table {
                min-width: 600px;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="fixed top-0 left-0 right-0 z-50" style="background: transparent; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="nav-container">
                <a href="../index.html" class="logo">Movie-Muse</a>
                <div class="hidden md:flex items-center gap-8">
                    <a href="../index.html" class="nav-link">首页</a>
                    <a href="category-list.html" class="nav-link">电影分类</a>
                    <a href="profile.html" class="nav-link">个人中心</a>
                    <a href="login.jsp" class="bg-white/20 hover:bg-white/30 text-white px-5 py-2 rounded-full font-medium text-center transition-colors backdrop-blur-sm border border-white/30">退出登录</a>
                </div>
                <button id="mobileMenuBtn" class="md:hidden text-white text-xl">
                    <i class="fas fa-bars"></i>
                </button>
            </div>

            <div id="mobileMenu" class="hidden md:hidden mt-4 pb-4 border-t border-white/10 pt-4">
                <div class="flex flex-col gap-4">
                    <a href="../index.html" class="nav-link">首页</a>
                    <a href="category-list.html" class="nav-link">电影分类</a>
                    <a href="profile.html" class="nav-link">个人中心</a>
                    <a href="login" class="bg-white/20 hover:bg-white/30 text-white px-5 py-2 rounded-full font-medium text-center transition-colors backdrop-blur-sm border border-white/30">退出登录</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
            <div class="content-header">
                <h1>我的收藏</h1>
                <p>这里展示您收藏的所有电影</p>
            </div>

            <div class="table-container">
                <table class="favorite-table">
                    <thead>
                        <tr>
                            <th>海报</th>
                            <th>电影名称</th>
                            <th>类型</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="favoriteList">
                        <tr>
                            <td><img src="https://picsum.photos/50/70?random=1" alt="星际穿越" class="poster-thumbnail"></td>
                            <td><span class="movie-title">星际穿越</span></td>
                            <td><span class="genre-badge">科幻</span></td>
                            <td>
                                <div class="actions">
                                    <button class="btn-sm btn-danger" onclick="removeFavorite(this)">
                                        <i class="fas fa-trash"></i> 取消收藏
                                    </button>
                                    <button class="btn-sm btn-primary-sm" onclick="viewMovie()">
                                        <i class="fas fa-eye"></i> 去观看
                                    </button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td><img src="https://picsum.photos/50/70?random=2" alt="盗梦空间" class="poster-thumbnail"></td>
                            <td><span class="movie-title">盗梦空间</span></td>
                            <td><span class="genre-badge">科幻</span></td>
                            <td>
                                <div class="actions">
                                    <button class="btn-sm btn-danger" onclick="removeFavorite(this)">
                                        <i class="fas fa-trash"></i> 取消收藏
                                    </button>
                                    <button class="btn-sm btn-primary-sm" onclick="viewMovie()">
                                        <i class="fas fa-eye"></i> 去观看
                                    </button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td><img src="https://picsum.photos/50/70?random=3" alt="泰坦尼克号" class="poster-thumbnail"></td>
                            <td><span class="movie-title">泰坦尼克号</span></td>
                            <td><span class="genre-badge">爱情</span></td>
                            <td>
                                <div class="actions">
                                    <button class="btn-sm btn-danger" onclick="removeFavorite(this)">
                                        <i class="fas fa-trash"></i> 取消收藏
                                    </button>
                                    <button class="btn-sm btn-primary-sm" onclick="viewMovie()">
                                        <i class="fas fa-eye"></i> 去观看
                                    </button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td><img src="https://picsum.photos/50/70?random=4" alt="阿凡达" class="poster-thumbnail"></td>
                            <td><span class="movie-title">阿凡达</span></td>
                            <td><span class="genre-badge">科幻</span></td>
                            <td>
                                <div class="actions">
                                    <button class="btn-sm btn-danger" onclick="removeFavorite(this)">
                                        <i class="fas fa-trash"></i> 取消收藏
                                    </button>
                                    <button class="btn-sm btn-primary-sm" onclick="viewMovie()">
                                        <i class="fas fa-eye"></i> 去观看
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <footer class="page-footer">
        <div class="footer-links">
            <a href="#">关于我们</a>
            <a href="#">隐私政策</a>
            <a href="#">服务条款</a>
            <a href="#">联系我们</a>
        </div>
        <p>&copy; 2024 Movie-Muse. All rights reserved.</p>
    </footer>

    <script src="../js/auth.js"></script>
    <script>
        // 页面加载时检查登录
        document.addEventListener('DOMContentLoaded', function() {
            checkLogin();
        });

        // Mobile menu toggle
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        
        if (mobileMenuBtn && mobileMenu) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
        }

        // Remove favorite functionality
        function removeFavorite(btn) {
            const row = btn.closest('tr');
            const movieTitle = row.querySelector('.movie-title').textContent;
            
            if (confirm(`确定要取消收藏 "${movieTitle}" 吗？`)) {
                row.style.background = 'rgba(239, 68, 68, 0.15)';
                row.style.transform = 'translateX(-20px)';
                row.style.opacity = '0';
                setTimeout(() => {
                    row.remove();
                    checkEmpty();
                }, 300);
            }
        }

        function viewMovie() {
            window.location.href = 'movie-detail.html';
        }

        function checkEmpty() {
            const tbody = document.getElementById('favoriteList');
            if (tbody.children.length === 0) {
                const tableContainer = document.querySelector('.table-container');
                tableContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-heart"></i>
                        </div>
                        <h3>暂无收藏</h3>
                        <p>快去发现并收藏您喜欢的电影吧！</p>
                        <a href="../index.html" class="btn btn-primary">去发现</a>
                    </div>
                `;
            }
        }

        // 退出登录
        document.querySelectorAll('a[href="login.jsp"]').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                logout();
            });
        });
    </script>
</body>
</html>
