<!-- Illustration Area Component -->
<div id="illustrationArea" class="illustration-area lg:w-2/5 lg:min-h-screen flex items-center justify-center p-8 relative">
    <!-- Decorative Background Elements -->
    <div class="bg-decoration bg-circle-1"></div>
    <div class="bg-decoration bg-circle-2"></div>
    <div class="bg-decoration bg-circle-3"></div>
    <div class="bg-decoration bg-circle-4"></div>
    <div class="bg-decoration bg-square"></div>
    <div class="bg-decoration bg-triangle"></div>
    <div class="bg-decoration bg-line"></div>

    <!-- Cartoon Characters Container -->
    <div id="characterContainer" class="character-container">
        <!-- Top Row -->
        <div class="character char-sm-1">
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
        </div>
        <div class="character char-sm-2">
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
        </div>

        <!-- Second Row -->
        <div class="character char-med-1">
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
        </div>
        <div class="character char-tall-1">
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
        </div>
        <div class="character char-med-2">
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
        </div>

        <!-- Third Row -->
        <div class="character char-wide-1">
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
        </div>
        <div class="character char-round-1">
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
        </div>

        <!-- Bottom Row -->
        <div class="character char-tall-2">
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
            <div class="mouth"></div>
        </div>
        <div class="character char-sm-3">
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
        </div>
        <div class="character char-med-3">
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
        </div>
    </div>
</div>
